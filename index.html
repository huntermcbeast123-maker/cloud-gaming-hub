<!DOCTYPE html>
<html>
<head>
    <title>Cloud Gaming Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 48px;
        }
        .subtitle {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .game-card:hover {
            transform: translateY(-5px);
        }
        .play-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .play-btn:hover {
            background: #764ba2;
        }
        .game-icon {
            font-size: 48px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Cloud Gaming Hub</h1>
        <div class="subtitle">Free browser games & cloud streaming links</div>
        
        <div class="game-grid" id="gameGrid"></div>
    </div>

    <script>
        const games = [
            { name: "2048", icon: "🧩", url: "https://play2048.co/" },
            { name: "Slope", icon: "🏔️", url: "https://slope-game.io/" },
            { name: "GeForce NOW", icon: "☁️", url: "https://play.geforcenow.com/" },
            { name: "Xbox Cloud", icon: "🎮", url: "https://www.xbox.com/play" }
        ];
        
        const grid = document.getElementById('gameGrid');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <div class="game-icon">${game.icon}</div>
                <h3>${game.name}</h3>
                <a href="${game.url}" target="_blank" class="play-btn">Play Now →</a>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
