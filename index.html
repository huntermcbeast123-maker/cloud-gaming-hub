<!DOCTYPE html>
<html>
<head>
    <title>Cloud Gaming Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 48px;
        }
        .subtitle {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .game-card:hover {
            transform: translateY(-5px);
        }
        .play-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .play-btn:hover {
            background: #764ba2;
        }
        .game-icon {
            font-size: 48px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Cloud Gaming Hub</h1>
        <div class="subtitle">Free browser games & cloud streaming links</div>
        
        <div class="game-grid" id="gameGrid"></div>
    </div>

    <script>
        const games = [
            { name: "2048", icon: "🧩", url: "https://play2048.co/" },
            { name: "Slope", icon: "🏔️", url: "https://slope-game.io/" },
            { name: "GeForce NOW", icon: "☁️", url: "https://play.geforcenow.com/" },
            { name: "Xbox Cloud", icon: "🎮", url: "https://www.xbox.com/play" }
        ];
        
        const grid = document.getElementById('gameGrid');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <div class="game-icon">${game.icon}</div>
                <h3>${game.name}</h3>
                <a href="${game.url}" target="_blank" class="play-btn">Play Now →</a>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Cloud Gaming Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 48px;
        }
        .subtitle {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        /* Sign In Box */
        .signin-section {
            background: white;
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .signin-section input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            text-align: center;
        }
        .signin-section button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        .signin-section button:hover {
            background: #764ba2;
        }
        
        /* Game Section - Hidden until signed in */
        .game-section {
            display: none;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .game-card:hover {
            transform: translateY(-5px);
        }
        .play-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .play-btn:hover {
            background: #764ba2;
        }
        .game-icon {
            font-size: 48px;
        }
        .welcome-bar {
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Sign In Section -->
    <div id="signinSection" class="signin-section">
        <h2>🎮 Welcome to Cloud Gaming Hub</h2>
        <p>Enter your username to start gaming</p>
        <input type="text" id="usernameInput" placeholder="Enter your username">
        <br>
        <button onclick="signIn()">Start Gaming →</button>
    </div>

    <!-- Games Section (hidden until sign in) -->
    <div id="gameSection" class="game-section">
        <div style="text-align: center;">
            <div class="welcome-bar">
                👋 Welcome, <span id="displayName">Gamer</span>!
                <button class="logout-btn" onclick="logout()">Sign Out</button>
            </div>
        </div>
        <h1>🎮 Cloud Gaming Hub</h1>
        <div class="subtitle">Click any game to play</div>
        <div class="game-grid" id="gameGrid"></div>
    </div>
</div>

<script>
    // List of games
    const games = [
        { name: "2048", icon: "🧩", url: "https://play2048.co/" },
        { name: "Slope", icon: "🏔️", url: "https://slope-game.io/" },
        { name: "GeForce NOW", icon: "☁️", url: "https://play.geforcenow.com/" },
        { name: "Xbox Cloud", icon: "🎮", url: "https://www.xbox.com/play" }
    ];

    // Display games
    const grid = document.getElementById('gameGrid');
    games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
            <div class="game-icon">${game.icon}</div>
            <h3>${game.name}</h3>
            <a href="${game.url}" target="_blank" class="play-btn">Play Now →</a>
        `;
        grid.appendChild(card);
    });

    // Sign In function
    function signIn() {
        const username = document.getElementById('usernameInput').value.trim();
        if (username === "") {
            alert("Please enter a username!");
            return;
        }
        
        // Save username
        localStorage.setItem("gamerName", username);
        
        // Show games, hide sign in
        document.getElementById('signinSection').style.display = 'none';
        document.getElementById('gameSection').style.display = 'block';
        document.getElementById('displayName').innerText = username;
    }

    // Logout function
    function logout() {
        localStorage.removeItem("gamerName");
        document.getElementById('signinSection').style.display = 'block';
        document.getElementById('gameSection').style.display = 'none';
        document.getElementById('usernameInput').value = '';
    }

    // Check if user is already signed in
    function checkLogin() {
        const savedName = localStorage.getItem("gamerName");
        if (savedName) {
            document.getElementById('signinSection').style.display = 'none';
            document.getElementById('gameSection').style.display = 'block';
            document.getElementById('displayName').innerText = savedName;
        }
    }

    // Run when page loads
    checkLogin();
</script>

</body>
</html>
